<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tolk Dashboard — Вхід</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F4F3EF;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border:.5px solid #E0DED6;border-radius:14px;padding:36px 40px;width:320px;text-align:center}
.logo{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#2E6DA3;margin-bottom:8px}
h1{font-size:20px;font-weight:700;color:#0E1C29;margin-bottom:4px}
.sub{font-size:13px;color:#5F5E5A;margin-bottom:28px}
input{width:100%;height:40px;border-radius:8px;border:.5px solid #C9C7BC;padding:0 12px;font-size:14px;outline:none;margin-bottom:12px}
input:focus{border-color:#2E6DA3}
button{width:100%;height:40px;border-radius:8px;background:#0E1C29;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#1a2e42}
.err{background:#FCEBEB;color:#A32D2D;font-size:13px;padding:8px 12px;border-radius:7px;margin-bottom:12px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Tolk Agency</div>
  <h1>Sales Dashboard</h1>
  <p class="sub">Введи пароль для входу</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Пароль" autofocus/>
    <button type="submit">Увійти</button>
  </form>
</div>
</body>
</html>
